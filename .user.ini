; PHP Settings for LiteSpeed/CGI/FPM hosts (like InfinityFree)
; These replace php_value directives from .htaccess
; Updated for large file uploads (200MB)

upload_max_filesize = 200M
post_max_size = 210M
max_execution_time = 600
max_input_time = 600
memory_limit = 256M
file_uploads = On
max_file_uploads = 20
